services:
  - type: web
    name: budgetwise-api
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: budgetwise-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://budgetwise.vercel.app # Replace with actual Vercel URL
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: budgetwise-db
    databaseName: budgetwise
    user: budgetwise_user
